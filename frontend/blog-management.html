<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="title" content="Elora Tech Institute | Blog Management">
    <meta name="description" content="Manage blog posts for the Elora Tech Institute platform.">
    <title>Blog Management - Elora Tech Institute</title>
    <link rel="stylesheet" href="css/style.css" />
        <link rel="stylesheet" href="css/profile.css" />

    <link rel="shortcut icon" href="images/favicon.ico" type="image/x-icon" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
        integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet" />
    <script src="https://cdn.tiny.cloud/1/pphbljuquzzebibjmeskvhpfijntj00zh2vlm9s955wnzsig/tinymce/7/tinymce.min.js"
        referrerpolicy="origin"></script>
    <style>
        .blog-container {
            max-width: 1400px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .blog-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            background: linear-gradient(135deg, #4b0082, #007bff);
            padding: 1.5rem;
            border-radius: 12px;
            color: white;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        .blog-header h2 {
            font-family: 'Montserrat', sans-serif;
            font-size: 2rem;
        }

        .btn {
            background: #4b0082;
            color: white;
            padding: 0.6rem 1.2rem;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: transform 0.2s, background 0.2s;
        }

        .btn:hover {
            transform: scale(1.1);
            background: #6a0dad;
        }

        .section {
            margin-bottom: 3rem;
            padding: 2rem;
            background: #f8f9fa;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        }

        .section h2 {
            font-family: 'Montserrat', sans-serif;
            margin-bottom: 1.5rem;
            color: #4b0082;
        }

        .list {
            padding: 0;
            list-style: none;
        }

        .list li {
            padding: 1rem;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            margin-bottom: 0.8rem;
            border-radius: 8px;
            transition: background 0.2s;
        }

        .list li:hover {
            background: #f1f1f1;
        }

        .list li button {
            margin-left: 0.5rem;
        }

        .list li button.delete {
            background: #dc3545;
        }

        .list li button.delete:hover {
            background: #c82333;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            padding: 2.5rem;
            border-radius: 12px;
            max-width: 600px;
            width: 95%;
            position: relative;
            animation: slideIn 0.3s ease;
        }

        .modal-content .close {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 1.8rem;
            cursor: pointer;
            color: #333;
        }

        @keyframes slideIn {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.6rem;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-family: 'Inter', sans-serif;
        }

        #drop-area {
            border: 2px dashed #ccc;
            padding: 1rem;
            text-align: center;
            margin-bottom: 1rem;
            cursor: pointer;
        }

        #drop-area:hover {
            border-color: #4b0082;
        }

        #preview {
            margin-top: 2rem;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
            background: #fff;
            max-height: 600px;
            overflow-y: auto;
        }

        #error {
            margin-top: 1rem;
            font-family: 'Inter', sans-serif;
            text-align: center;
            font-size: 1.1rem;
        }
    </style>
</head>

<body>
   <nav id="navbar" role="navigation" aria-label="Main navigation">
        <a href="index.html">
            <h1 id="logo">
                <img src="images/eti logo main.jfif" alt="Elora Tech Institute Logo">
            </h1>
        </a>
        <button class="menu-toggle" aria-label="Toggle menu" aria-expanded="false">
            <i class="fa-solid fa-bars"></i>
        </button>
        <ul id="nav-link" role="menu"></ul>
        <ul class="nav-link">
            <li role="menuitem" class="dropdown-parent main nb" aria-haspopup="true" aria-expanded="false"><img
                    id="dashboard-profile-picture" class="dashboard-profile-picture" src="images/avatars/default.jpg"
                    alt="Profile Picture" onclick="window.location.href='profile.html'">
                <div class="dropdown1">
                    <ul class="dropdown" role="menuitem">
                        <li role="menuitem"><a href="profile.html"></a>Profile</li>
                        <li role="menuitem"><a href=".html"></a>Settings</li>
                        <li role="menuitem" class="logout-btn" onclick="logout()"><a href="#"></a>logout</li>

                    </ul>
                </div>
            </li>
        </ul>
        <div id="toggle"><i class="fa-solid fa-moon"></i></div>
    </nav>
    <button class="sidebar-toggle" aria-expanded="false">
        <i class="fa-solid fa-bars"></i>
    </button>
    <aside id="sidebar-nav">
        <ul class="links"></ul>
    </aside>

    <div class="blog-container">
        <div class="blog-header">
            <h2>Manage Blog Posts, <span id="userName"></span>! 📝</h2>
        </div>

        <div class="section">
            <h2>Engage Your Audience with Blogs</h2>
            <button class="btn" onclick="openCreateBlogModal()">Create New Blog Post</button>
            <ul class="list" id="blog-list"></ul>
        </div>

        <div id="error"></div>
    </div>

    <!-- Create/Edit Blog Modal -->
    <div id="blogModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('blogModal')">×</span>
            <h2 id="blogModalTitle">Create Blog Post</h2>
            <input type="hidden" id="blog-id">
            <div class="form-group">
                <label for="blog-title">Title</label>
                <input type="text" id="blog-title" placeholder="Enter blog title" required>
            </div>
            <div class="form-group">
                <label for="blog-category">Category</label>
                <select id="blog-category" required>
                    <option value="" disabled selected>Select a category</option>
                    <option value="Student Stories">Student Stories</option>
                    <option value="Tech Tutorials">Tech Tutorials</option>
                    <option value="Institute News">Institute News</option>
                    <option value="Events & Workshops">Events & Workshops</option>
                    <option value="Career & Industry Insights">Career & Industry Insights</option>
                    <option value="Founder's Note">Founder's Note</option>
                    <option value="Community Highlights">Community Highlights</option>
                    <option value="Learning Resources">Learning Resources</option>
                    <option value="Insights & Reports">Insights & Reports</option>
                    <option value="Video Spotlight">Video Spotlight</option>
                </select>
            </div>
            <div class="form-group">
                <label for="blog-content">Content</label>
                <textarea id="blog-content" placeholder="Write your blog post"></textarea>
            </div>
            <div class="form-group">
                <label for="file-upload">Upload Image/Video</label>
                <div id="drop-area">
                    <p>Drag & drop your file here or click to upload</p>
                    <input type="file" id="file-upload" accept="image/*,video/*" style="display: none;">
                </div>
            </div>
            <div class="form-group">
                <label for="blog-tags">Tags (comma-separated)</label>
                <input type="text" id="blog-tags" placeholder="e.g., javascript, career, studentproject">
            </div>
            <div class="form-group">
                <label for="blog-featured">Featured Post</label>
                <input type="checkbox" id="blog-featured">
            </div>
            <div class="form-group">
                <label for="blog-draft">Save as Draft</label>
                <input type="checkbox" id="blog-draft" checked>
            </div>
            <button class="btn" onclick="previewBlog()">Preview</button>
            <button class="btn" onclick="saveBlogPost()">Save Post</button>
        </div>
    </div>

    <!-- Preview Modal -->
    <div id="previewModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('previewModal')">×</span>
            <h2>Blog Preview</h2>
            <div id="preview"></div>
        </div>
    </div>

    <script src="js/navConfig.js"></script>
    <script src="js/nav.js"></script>
    <script src="js/script.js"></script>
    <script src="js/admindash.js"></script>
    <script>
        // Initialize TinyMCE
        tinymce.init({
            selector: '#blog-content',
            plugins: 'image link lists media',
            toolbar: 'undo redo | bold italic | alignleft aligncenter alignright | image link media | bullist numlist',
            height: 400,
            menubar: false,
            images_upload_url: '/api/blogs/upload',
            images_upload_handler: async (blobInfo, success, failure) => {
                const formData = new FormData();
                formData.append('file', blobInfo.blob(), blobInfo.filename());
                try {
                    const response = await fetchWithAuth('/api/blogs/upload', {
                        method: 'POST',
                        body: formData
                    });
                    success(response.url);
                } catch (err) {
                    failure('Upload failed: ' + err.message);
                }
            }
        });

        // Drag-and-drop file upload
        const dropArea = document.getElementById('drop-area');
        const fileInput = document.getElementById('file-upload');
        let uploadedFileUrl = '';

        dropArea.addEventListener('click', () => fileInput.click());
        dropArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropArea.style.borderColor = '#4b0082';
        });
        dropArea.addEventListener('dragleave', () => {
            dropArea.style.borderColor = '#ccc';
        });
        dropArea.addEventListener('drop', async (e) => {
            e.preventDefault();
            dropArea.style.borderColor = '#ccc';
            const file = e.dataTransfer.files[0];
            if (file) await handleFileUpload(file);
        });
        fileInput.addEventListener('change', async (e) => {
            if (e.target.files[0]) await handleFileUpload(e.target.files[0]);
        });

        async function handleFileUpload(file) {
            const formData = new FormData();
            formData.append('file', file);
            try {
                const response = await fetchWithAuth('/api/blogs/upload', {
                    method: 'POST',
                    body: formData
                });
                uploadedFileUrl = response.url;
                dropArea.innerHTML = `<p>Uploaded: ${file.name}</p>`;
            } catch (err) {
                showError('File upload failed: ' + err.message);
            }
        }

        // Auto-save draft
        let autoSaveTimeout;
        function startAutoSave() {
            clearTimeout(autoSaveTimeout);
            autoSaveTimeout = setTimeout(async () => {
                if (document.getElementById('blog-id').value || document.getElementById('blog-title').value) {
                    await saveBlogPost(true);
                }
            }, 30000); // Auto-save every 30 seconds
        }

        document.getElementById('blog-title').addEventListener('input', startAutoSave);
        document.getElementById('blog-content').addEventListener('input', startAutoSave);

        // Open modal for creating a new blog post
        function openCreateBlogModal() {
            document.getElementById('blogModalTitle').textContent = 'Create Blog Post';
            document.getElementById('blog-id').value = '';
            document.getElementById('blog-title').value = '';
            document.getElementById('blog-category').value = '';
            tinymce.get('blog-content').setContent('');
            document.getElementById('blog-tags').value = '';
            document.getElementById('blog-featured').checked = false;
            document.getElementById('blog-draft').checked = true;
            dropArea.innerHTML = '<p>Drag & drop your file here or click to upload</p>';
            uploadedFileUrl = '';
            openModal('blogModal');
        }

        // Open modal for editing a blog post
        async function openEditBlogModal(id) {
            try {
                const blog = await fetchWithAuth(`/api/blogs/${id}`);
                document.getElementById('blogModalTitle').textContent = 'Edit Blog Post';
                document.getElementById('blog-id').value = blog.id;
                document.getElementById('blog-title').value = blog.title;
                document.getElementById('blog-category').value = blog.category;
                tinymce.get('blog-content').setContent(blog.content);
                document.getElementById('blog-tags').value = blog.tags.join(', ');
                document.getElementById('blog-featured').checked = blog.is_featured;
                document.getElementById('blog-draft').checked = blog.is_draft;
                uploadedFileUrl = blog.image_url || blog.video_url || '';
                dropArea.innerHTML = uploadedFileUrl ? `<p>Uploaded: ${uploadedFileUrl.split('/').pop()}</p>` : '<p>Drag & drop your file here or click to upload</p>';
                openModal('blogModal');
            } catch (err) {
                showError('Failed to load blog post: ' + err.message);
            }
        }

        // Preview blog
        function previewBlog() {
            const title = document.getElementById('blog-title').value;
            const content = tinymce.get('blog-content').getContent();
            const image = uploadedFileUrl && uploadedFileUrl.match(/\.(png|jpg|jpeg)$/i) ? `<img src="${uploadedFileUrl}" alt="Preview" style="max-width:100%;">` : '';
            const video = uploadedFileUrl && uploadedFileUrl.match(/\.(mp4|mov)$/i) ? `<video src="${uploadedFileUrl}" controls style="max-width:100%;"></video>` : '';
            document.getElementById('preview').innerHTML = `
                <h1>${title}</h1>
                ${image}
                ${video}
                <div>${content}</div>
            `;
            openModal('previewModal');
        }

        // Save blog post
        async function saveBlogPost(isAutoSave = false) {
            const id = document.getElementById('blog-id').value;
            const title = document.getElementById('blog-title').value;
            const category = document.getElementById('blog-category').value;
            const content = tinymce.get('blog-content').getContent();
            const tags = document.getElementById('blog-tags').value.split(',').map(t => t.trim()).filter(t => t);
            const isFeatured = document.getElementById('blog-featured').checked;
            const isDraft = document.getElementById('blog-draft').checked || isAutoSave;
            const image_url = uploadedFileUrl && uploadedFileUrl.match(/\.(png|jpg|jpeg)$/i) ? uploadedFileUrl : null;
            const video_url = uploadedFileUrl && uploadedFileUrl.match(/\.(mp4|mov)$/i) ? uploadedFileUrl : null;

            if (!title || !category || !content) {
                if (!isAutoSave) showError('Please fill in all required fields.');
                return;
            }

            try {
                const method = id ? 'PUT' : 'POST';
                const url = id ? `/api/blogs/${id}` : '/api/blogs';
                await fetchWithAuth(url, {
                    method,
                    body: JSON.stringify({
                        title,
                        content,
                        category,
                        tags,
                        image_url,
                        video_url,
                        is_featured: isFeatured,
                        is_draft: isDraft
                    })
                });
                closeModal('blogModal');
                fetchBlogPosts();
                showError(isAutoSave ? 'Draft auto-saved' : 'Blog post saved successfully!', '#28a745');
            } catch (err) {
                const errorMessage = err.message.includes('duplicate key')
                    ? 'A blog with a similar title already exists. Please use a unique title.'
                    : `Failed to save blog post: ${err.message}`;
                showError(errorMessage);
            }
        }

        // Delete blog post
        async function deleteBlogPost(id) {
            if (!confirm('Are you sure you want to delete this blog post?')) return;
            try {
                await fetchWithAuth(`/api/blogs/${id}`, { method: 'DELETE' });
                fetchBlogPosts();
                showError('Blog deleted successfully!', '#28a745');
            } catch (err) {
                showError('Failed to delete blog post: ' + err.message);
            }
        }

        // Fetch and display blog posts
        async function fetchBlogPosts() {
            try {
                const response = await fetchWithAuth('/api/blogs');
                const { blogs } = response;
                const blogList = document.getElementById('blog-list');
                blogList.innerHTML = blogs.length === 0 ? '<li>No blog posts found</li>' : '';
                blogs.forEach(blog => {
                    const li = document.createElement('li');
                    li.innerHTML = `
                        <span>${blog.title} (${blog.category}) ${blog.is_draft ? '[Draft]' : ''}${blog.is_featured ? '[Featured]' : ''} - ${new Date(blog.created_at).toLocaleDateString()}</span>
                        <div>
                            <button onclick="openEditBlogModal('${blog.id}')">Edit</button>
                            <button class="delete" onclick="deleteBlogPost('${blog.id}')">Delete</button>
                        </div>
                    `;
                    blogList.appendChild(li);
                });
            } catch (err) {
                showError('Failed to load blog posts: ' + err.message);
            }
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            const user = JSON.parse(localStorage.getItem('user'));
            if (!user || user.role !== 'admin') {
                window.location.href = 'admin-signup-login.html';
            }
            document.getElementById('userName').textContent = user.name || 'Admin';
            fetchBlogPosts();
        });
    </script>
</body>

</html>
